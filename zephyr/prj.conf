# ── C++ standard ─────────────────────────────────────────────────────────
CONFIG_CPP=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_STD_CPP20=y
CONFIG_REQUIRES_FLOAT_PRINTF=n

# ── Zero heap — mandatory per project spec ────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=0

# ── Peripherals ───────────────────────────────────────────────────────────
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_GPIO=y
CONFIG_PWM=y

# ── Thread stack sizes ────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=1024
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=512

# ── Logging (optional, remove for production) ─────────────────────────────
CONFIG_LOG=n